apiVersion: v2
name: ecommerce-platform
description: E-Commerce Platform Helm Chart
type: application
version: 1.0.0
appVersion: "1.0.0"

# Chart dependencies
dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    alias: postgres
    condition: postgresql.enabled
  - name: kafka
    version: "20.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    alias: kafka
    condition: kafka.enabled
  - name: redis
    version: "17.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    alias: redis
    condition: redis.enabled

maintainers:
  - name: Engineering
    email: engineering@example.com
